<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AmiBa Live - Studio Diffusion</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#7000ff;--accent:#ff004c;--bg:#0a0a12;--card:#15151f}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif}
body{background:var(--bg);color:#fff;overflow-x:hidden}
header{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:rgba(21,21,31,0.9);backdrop-filter:blur(10px);border-bottom:1px solid #222;position:sticky;top:0;z-index:10}
.logo{display:flex;align-items:center;gap:12px;font-weight:800;font-size:22px}
.logo-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:10px;display:grid;place-items:center}
.viewers{background:#1e1e2d;padding:8px 15px;border-radius:30px;font-size:13px;display:flex;gap:8px;align-items:center}
.live-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1} 50%{opacity:.2}}
main{display:grid;grid-template-columns:1.8fr 1fr;gap:25px;padding:25px}
@media(max-width:900px){main{grid-template-columns:1fr}}
.preview-wrap{position:relative;background:var(--card);border-radius:20px;overflow:hidden;aspect-ratio:16/9;box-shadow:0 20px 60px rgba(0,0,0,.6)}
video{width:100%;height:100%;object-fit:cover;background:#000}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.bein-bar{position:absolute;top:20px;left:20px;background:linear-gradient(90deg,#7000ff 0%,#4a00a8 100%);padding:6px 18px;border-radius:4px;font-weight:800;font-size:14px;letter-spacing:1px;display:flex;align-items:center;gap:8px;box-shadow:0 4px 15px rgba(0,0,0,.4)}
.bein-bar span{background:#fff;color:#7000ff;padding:2px 6px;border-radius:3px;font-size:10px}
.logo-on-stream{position:absolute;bottom:20px;right:20px;width:90px;opacity:.9}
.live-badge{position:absolute;top:20px;right:20px;background:var(--accent);padding:5px 12px;border-radius:4px;font-size:12px;font-weight:700}
.controls-panel{background:var(--card);border-radius:20px;padding:25px;display:flex;flex-direction:column;gap:20px}
.btn{border:none;padding:14px;border-radius:12px;font-weight:700;cursor:pointer;transition:.2s;display:flex;justify-content:center;align-items:center;gap:8px}
.btn-primary{background:linear-gradient(90deg,var(--primary),var(--accent));color:#fff}
.btn-dark{background:#222235;color:#fff}
.btn:hover{transform:translateY(-2px);opacity:.9}
.row{display:flex;gap:10px}
.row.btn{flex:1}
input[type=range]{width:100%;accent-color:var(--primary)}
.link-box{background:#0a0a12;border:1px dashed #333;padding:15px;border-radius:12px;word-break:break-all;font-size:13px}
.q-select{display:flex;gap:8px}
.q-select button{flex:1;padding:8px;background:#222235;border:1px solid #333;color:#fff;border-radius:8px;cursor:pointer}
.q-select button.active{border-color:var(--primary);background:var(--primary)}
footer{text-align:center;padding:20px;opacity:.5;font-size:12px;letter-spacing:1px}
</style>
</head>
<body>
<header>
<div class="logo"><div class="logo-icon">AB</div> AmiBa <span style="font-weight:400;opacity:.6">LIVE</span></div>
<div class="viewers"><div class="live-dot"></div><span id="viewerCount">0</span> spectateurs</div>
</header>

<main>
<div class="preview-wrap">
<video id="preview" autoplay muted playsinline></video>
<div class="overlay">
<div class="bein-bar"><span>beIN</span> SPORTS • LIVE <div style="width:6px;height:6px;background:#fff;border-radius:50%;animation:blink 1s infinite"></div></div>
<div class="live-badge">● DIRECT</div>
<img id="streamLogo" class="logo-on-stream" src="" style="display:none">
<canvas id="logoCanvas" style="display:none"></canvas>
</div>
</div>

<div class="controls-panel">
<h3>Studio de Diffusion</h3>

<div class="row">
<button class="btn btn-dark" id="btnCam">🎥 Caméra</button>
<button class="btn btn-dark" id="btnMic">🎤 Micro OFF</button>
</div>
<button class="btn btn-dark" id="btnScreen">🖥️ Partager Écran + Son Système</button>

<div>
<label>Volume Micro / Son Système</label>
<input type="range" id="vol" min="0" max="100" value="80">
</div>

<div>
<label>Qualité du Direct</label>
<div class="q-select">
<button data-q="360" class="active">360p</button>
<button data-q="720">720p HD</button>
<button data-q="1080">1080p FHD</button>
</div>
</div>

<div>
<label>Logo sur le stream (comme beIN)</label>
<input type="file" id="logoInput" accept="image/*" style="margin-top:8px">
</div>

<button class="btn btn-primary" id="btnGoLive" style="padding:18px;font-size:16px">🔴 LANCER LE DIRECT</button>

<div id="shareArea" style="display:none">
<label>Lien à partager aux spectateurs :</label>
<div class="link-box" id="shareLink"></div>
<button class="btn btn-dark" id="btnCopy" style="margin-top:10px;width:100%">Copier le lien</button>
</div>
</div>
</main>

<footer>Site by AmiBa Groupe - Tous droits réservés</footer>

<script>
const preview = document.getElementById('preview');
const viewerCountEl = document.getElementById('viewerCount');
let localStream, mixedStream, peer, currentQuality='360', micEnabled=false, camEnabled=true;
let audioCtx, gainNode, viewers=0;
const peers = {};

// --- Gestion Audio Mix Micro + Son Systeme ---
function setupAudioMix(stream){
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  const dest = audioCtx.createMediaStreamDestination();
  gainNode = audioCtx.createGain();
  gainNode.gain.value = document.getElementById('vol').value/100;
  stream.getAudioTracks().forEach(t=>{
    const src = audioCtx.createMediaStreamSource(new MediaStream([t]));
    src.connect(gainNode);
  });
  gainNode.connect(dest);
  return dest.stream.getAudioTracks()[0];
}

async function initCamera(q){
  const constraints = { video:{width: q==360?640:q==720?1280:1920, height: q==360?360:q==720?720:1080, frameRate:30 }, audio:true };
  if(localStream) localStream.getTracks().forEach(t=>t.stop());
  localStream = await navigator.mediaDevices.getUserMedia(constraints);
  preview.srcObject = localStream;
  micEnabled = true;
  document.getElementById('btnMic').innerText='🎤 Micro ON';
  document.getElementById('btnMic').style.background='#7000ff';
}

initCamera(360);

document.querySelectorAll('.q-select button').forEach(b=>{
  b.onclick=async()=>{
    document.querySelectorAll('.q-select button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    currentQuality=b.dataset.q;
    await initCamera(currentQuality);
    updateAllPeers();
  }
});

document.getElementById('btnCam').onclick=()=>{
  camEnabled=!camEnabled;
  localStream.getVideoTracks()[0].enabled=camEnabled;
  document.getElementById('btnCam').innerText=camEnabled?'🎥 Caméra':'📷 Cam OFF';
};

document.getElementById('btnMic').onclick=()=>{
  micEnabled=!micEnabled;
  localStream.getAudioTracks().forEach(t=>t.enabled=micEnabled);
  document.getElementById('btnMic').innerText=micEnabled?'🎤 Micro ON':'🔇 Micro OFF';
  document.getElementById('btnMic').style.background=micEnabled?'#7000ff':'#222235';
};

document.getElementById('vol').oninput=(e)=>{
  if(gainNode) gainNode.gain.value=e.target.value/100;
  preview.volume=e.target.value/100;
};

// Partage Ecran AVEC SON
document.getElementById('btnScreen').onclick=async()=>{
  try{
    const screenStream = await navigator.mediaDevices.getDisplayMedia({video:true,audio:true});
    const screenVideo = screenStream.getVideoTracks()[0];
    const systemAudio = screenStream.getAudioTracks()[0];

    // Mix micro + son systeme
    const newStream = new MediaStream();
    newStream.addTrack(screenVideo);
    if(localStream.getAudioTracks()[0] && systemAudio){
      // Mix des 2 audios
      audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      const dest = audioCtx.createMediaStreamDestination();
      gainNode = audioCtx.createGain();
      [localStream.getAudioTracks()[0], systemAudio].forEach(track=>{
        audioCtx.createMediaStreamSource(new MediaStream([track])).connect(gainNode);
      });
      gainNode.connect(dest);
      newStream.addTrack(dest.stream.getAudioTracks()[0]);
    } else if(systemAudio) {
      newStream.addTrack(systemAudio);
    } else if(localStream.getAudioTracks()[0]) {
      newStream.addTrack(localStream.getAudioTracks()[0]);
    }

    localStream = newStream;
    preview.srcObject = localStream;
    updateAllPeers();
    screenVideo.onended=()=>initCamera(currentQuality);
  }catch(e){alert('Partage annulé: '+e.message)}
};

// Logo overlay
document.getElementById('logoInput').onchange=(e)=>{
  const file=e.target.files[0];
  if(!file) return;
  const url=URL.createObjectURL(file);
  document.getElementById('streamLogo').src=url;
  document.getElementById('streamLogo').style.display='block';
};

// Lancer le direct
document.getElementById('btnGoLive').onclick=()=>{
  if(!localStream) return alert('Active la caméra d\'abord');
  const roomId = 'amiba-'+Math.random().toString(36).substring(2,8).toUpperCase();
  peer = new Peer(roomId, { config:{iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]} });

  peer.on('open', id=>{
    const url = `${location.origin}${location.pathname.replace('index.html','')}view.html?id=${id}`;
    document.getElementById('shareLink').innerText=url;
    document.getElementById('shareArea').style.display='block';
    document.getElementById('btnGoLive').innerText='✅ DIRECT EN COURS';
  });

  peer.on('connection', conn=>{
    viewers++;
    viewerCountEl.innerText=viewers;
  });

  peer.on('call', call=>{
    call.answer(localStream);
    peers[call.peer]=call;
    viewers++;
    viewerCountEl.innerText=viewers;
    call.on('close',()=>{ viewers=Math.max(0,viewers-1); viewerCountEl.innerText=viewers; });
  });
};

function updateAllPeers(){
  Object.values(peers).forEach(call=>{
    localStream.getTracks().forEach(track=>{
      const sender = call.peerConnection.getSenders().find(s=>s.track && s.track.kind===track.kind);
      if(sender) sender.replaceTrack(track);
    });
  });
}

document.getElementById('btnCopy').onclick=()=>{
  navigator.clipboard.writeText(document.getElementById('shareLink').innerText);
  document.getElementById('btnCopy').innerText='Lien copié!';
  setTimeout(()=>document.getElementById('btnCopy').innerText='Copier le lien',2000);
};
</script>
</body>
</html>
